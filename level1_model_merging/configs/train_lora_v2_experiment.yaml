project_name: qwen25_1p5b_self_trained_lora_v2_evalprompt_merge

base_model: Qwen/Qwen2.5-1.5B

expert_models:
  code: trained_lora_experts_v2/code_qwen25_1p5b_mbpp_body_lr5e5
  math: trained_lora_experts_v2/math_qwen25_1p5b_gsm8k_evalprompt_lr5e5

lora_adapters:
  code: trained_lora_adapters_v2/code_qwen25_1p5b_mbpp_body_lr5e5
  math: trained_lora_adapters_v2/math_qwen25_1p5b_gsm8k_evalprompt_lr5e5

merge_dtype: bfloat16

paths:
  merge_config_dir: generated_merge_configs_trained_lora_v2
  merge_output_dir: merged_models_trained_lora_v2
  results_dir: results_trained_lora_v2
  hf_cache_dir: ../hf_cache

train:
  common:
    torch_dtype: bfloat16
    max_seq_length: 768
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 8
    learning_rate: 0.00005
    num_train_epochs: 1
    max_steps: 0
    warmup_ratio: 0.03
    logging_steps: 10
    save_steps: 200
    save_total_limit: 2
    seed: 42
    gradient_checkpointing: true
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

  tasks:
    math:
      dataset_name: openai/gsm8k
      dataset_config: main
      split: train
      format: gsm8k_eval_prompt
      max_samples: 3000
      num_train_epochs: 2

    code:
      dataset_name: google-research-datasets/mbpp
      dataset_config: full
      split: train+validation+prompt+test
      format: mbpp_function_body
      max_samples: 0
      num_train_epochs: 5

methods:
  - name: slerp_v2_code080_math020
    merge_method: slerp
    description: Code-heavy SLERP for stronger HumanEval transfer while retaining some math LoRA ability.
    parameters:
      t: 0.20

  - name: slerp_v2_code050_math050
    merge_method: slerp
    description: Balanced SLERP to test whether the stronger math LoRA also improves code retention.
    parameters:
      t: 0.50

  - name: slerp_v2_code020_math080
    merge_method: slerp
    description: Math-heavy SLERP to probe the best overall trade-off after the math LoRA became strong on both tasks.
    parameters:
      t: 0.80

  - name: task_v2_code080_math020_l100
    merge_method: task_arithmetic
    description: Code-heavy Task Arithmetic candidate for non-SLERP comparison.
    weights:
      code: 0.80
      math: 0.20
    parameters:
      lambda: 1.00
      normalize: false

  - name: task_v2_code050_math050_l100
    merge_method: task_arithmetic
    description: Balanced Task Arithmetic candidate for non-SLERP weight-ratio analysis.
    weights:
      code: 0.50
      math: 0.50
    parameters:
      lambda: 1.00
      normalize: false

  - name: task_v2_code020_math080_l100
    merge_method: task_arithmetic
    description: Math-heavy Task Arithmetic candidate for non-SLERP weight-ratio analysis.
    weights:
      code: 0.20
      math: 0.80
    parameters:
      lambda: 1.00
      normalize: false

  - name: ties_v2_code080_math020_d080
    merge_method: ties
    description: Code-heavy full-weight TIES candidate.
    weights:
      code: 0.80
      math: 0.20
    parameters:
      density: 0.80
      lambda: 1.00
      normalize: true
      int8_mask: true

  - name: ties_v2_code050_math050_d080
    merge_method: ties
    description: Balanced full-weight TIES candidate.
    weights:
      code: 0.50
      math: 0.50
    parameters:
      density: 0.80
      lambda: 1.00
      normalize: true
      int8_mask: true

  - name: ties_v2_code020_math080_d080
    merge_method: ties
    description: Math-heavy full-weight TIES candidate.
    weights:
      code: 0.20
      math: 0.80
    parameters:
      density: 0.80
      lambda: 1.00
      normalize: true
      int8_mask: true

adapter_merges:
  - name: lora_svd_v2_code080_math020
    combination_type: svd
    code_weight: 0.80
    math_weight: 0.20
    svd_rank: 16

  - name: lora_ties_svd_v2_code080_math020
    combination_type: ties_svd
    code_weight: 0.80
    math_weight: 0.20
    svd_rank: 16
    density: 0.80

  - name: lora_svd_v2_code050_math050
    combination_type: svd
    code_weight: 0.50
    math_weight: 0.50
    svd_rank: 16

  - name: lora_svd_v2_code020_math080
    combination_type: svd
    code_weight: 0.20
    math_weight: 0.80
    svd_rank: 16

  - name: lora_ties_svd_v2_code050_math050
    combination_type: ties_svd
    code_weight: 0.50
    math_weight: 0.50
    svd_rank: 16
    density: 0.80

  - name: lora_ties_svd_v2_code020_math080
    combination_type: ties_svd
    code_weight: 0.20
    math_weight: 0.80
    svd_rank: 16
    density: 0.80

eval:
  generation:
    torch_dtype: auto
    device_map: auto
    max_new_tokens_math: 768
    max_new_tokens_code: 512
  math:
    dataset_name: openai/gsm8k
    dataset_config: main
    split: test
    limit: 100
  code:
    dataset_name: openai/openai_humaneval
    split: test
    limit: 50
