project_name: qwen25_1p5b_lora_code_math_merge

# Clean LoRA experiment: both adapters declare the same base model in adapter_config.json.
base_model: Qwen/Qwen2.5-1.5B-Instruct

expert_models:
  code: lora_experts/code_qwen25_1p5b_instruct_code_lora_r16
  math: lora_experts/math_qwen25_1p5b_instruct_math_cot_dora

lora_adapters:
  code: bharati2324/Qwen2.5-1.5B-Instruct-Code-LoRA-r16
  math: vukien2301/qwen2.5-1.5b-sft-gpt54mini-math_cot-dora-adapter

merge_dtype: bfloat16

paths:
  merge_config_dir: generated_merge_configs_lora
  merge_output_dir: merged_models_lora
  results_dir: results_lora
  lora_expert_dir: lora_experts
  hf_cache_dir: ../hf_cache

methods:
  - name: slerp_lora_code095_math005
    merge_method: slerp
    description: Very code-heavy SLERP to test whether HumanEval can stay above base.
    parameters:
      t: 0.05

  - name: slerp_lora_code090_math010
    merge_method: slerp
    description: Code-heavy SLERP with a small math expert contribution.
    parameters:
      t: 0.10

  - name: slerp_lora_code080_math020
    merge_method: slerp
    description: Code-heavy SLERP between two materialized LoRA experts.
    parameters:
      t: 0.20

  - name: slerp_lora_code050_math050
    merge_method: slerp
    description: Balanced SLERP between two materialized LoRA experts.
    parameters:
      t: 0.50

  - name: slerp_lora_code020_math080
    merge_method: slerp
    description: Math-heavy SLERP between two materialized LoRA experts.
    parameters:
      t: 0.80

  - name: task_lora_code050_math050_l100
    merge_method: task_arithmetic
    description: Balanced Task Arithmetic from the shared LoRA base.
    weights:
      code: 0.50
      math: 0.50
    parameters:
      lambda: 1.00
      normalize: false

  - name: task_lora_code090_math010_l100
    merge_method: task_arithmetic
    description: Code-heavy Task Arithmetic from the shared LoRA base.
    weights:
      code: 0.90
      math: 0.10
    parameters:
      lambda: 1.00
      normalize: false

  - name: ties_lora_code050_math050_d050
    merge_method: ties
    description: Balanced TIES from the shared LoRA base.
    weights:
      code: 0.50
      math: 0.50
    parameters:
      density: 0.50
      lambda: 1.00
      normalize: true
      int8_mask: true

  - name: ties_lora_code090_math010_d080
    merge_method: ties
    description: Code-heavy TIES from the shared LoRA base.
    weights:
      code: 0.90
      math: 0.10
    parameters:
      density: 0.80
      lambda: 1.00
      normalize: true
      int8_mask: true

eval:
  generation:
    torch_dtype: auto
    device_map: auto
    max_new_tokens_math: 768
    max_new_tokens_code: 512
  math:
    dataset_name: openai/gsm8k
    dataset_config: main
    split: test
    limit: 100
  code:
    dataset_name: openai/openai_humaneval
    split: test
    limit: 50
