project_name: qwen25_1p5b_code_math_merge_code_focused

# Use the non-instruction-tuned base as the real reference model.
# The two experts are instruction/code/math tuned descendants from the Qwen2.5 family.
base_model: Qwen/Qwen2.5-1.5B

expert_models:
  code: Qwen/Qwen2.5-Coder-1.5B-Instruct
  math: Qwen/Qwen2.5-Math-1.5B-Instruct

merge_dtype: bfloat16

paths:
  merge_config_dir: generated_merge_configs_improved
  merge_output_dir: merged_models_improved
  results_dir: results_improved
  hf_cache_dir: ../hf_cache

# Final sweep after the first improved run:
# - The first improved run only tested math-heavy or balanced SLERP settings. Since the
#   code expert is strong on both HumanEval and GSM8K, the remaining SLERP search focuses
#   on code-heavy settings plus the known math-heavy anchor.
# - Early balanced Task Arithmetic and TIES variants failed on HumanEval. The current
#   non-SLERP candidates are intentionally code-heavy and stronger, so they can test
#   whether a task-vector method can beat the real base model at least on one or both
#   target benchmarks.
methods:
  - name: slerp_code090_math010
    merge_method: slerp
    description: Very code-heavy SLERP; intended to keep HumanEval close to the code expert while injecting a small math component.
    parameters:
      t: 0.10

  - name: slerp_code080_math020
    merge_method: slerp
    description: Code-heavy SLERP; primary candidate for clearer HumanEval retention with nonzero math reuse.
    parameters:
      t: 0.20

  - name: slerp_code070_math030
    merge_method: slerp
    description: Moderately code-heavy SLERP; probes the transition point before previous balanced merges collapsed.
    parameters:
      t: 0.30

  - name: slerp_code020_math080
    merge_method: slerp
    description: Math-heavy SLERP retained as the previous best two-benchmark merged model.
    parameters:
      t: 0.80

  - name: task_code080_math020_l100
    merge_method: task_arithmetic
    description: Code-heavy Task Arithmetic; stronger task vector than the earlier conservative failed variants.
    weights:
      code: 0.80
      math: 0.20
    parameters:
      lambda: 1.00
      normalize: false

  - name: ties_code080_math020_d080
    merge_method: ties
    description: Code-heavy high-density TIES; keeps more code signal while still applying sign-consensus filtering.
    weights:
      code: 0.80
      math: 0.20
    parameters:
      density: 0.80
      lambda: 1.00
      normalize: true
      int8_mask: true

eval:
  generation:
    torch_dtype: auto
    device_map: auto
    max_new_tokens_math: 768
    max_new_tokens_code: 512
  math:
    dataset_name: openai/gsm8k
    dataset_config: main
    split: test
    limit: 100
  code:
    dataset_name: openai/openai_humaneval
    split: test
    limit: 50
